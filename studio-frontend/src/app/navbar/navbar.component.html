<nav class="sticky top-0 z-50 border-b border-slate-800 bg-slate-950/95 backdrop-blur">
  <div class="mx-auto flex max-w-6xl items-center gap-4 px-4 py-3">
    <div class="flex items-center gap-3">
      <div class="flex h-9 w-9 items-center justify-center rounded-xl bg-emerald-500/10 text-emerald-300">
        <span class="text-lg font-semibold">AI</span>
      </div>
      <div>
        <p class="text-sm font-semibold text-slate-100">Interview Studio</p>
        <p class="text-[11px] text-slate-500">Unified candidate workspace</p>
      </div>
    </div>

    <div class="flex flex-1 items-center justify-end gap-1">
      <a
        routerLink="/dashboard"
        routerLinkActive="nav-active"
        [routerLinkActiveOptions]="{ exact: false }"
        class="nav-link"
      >
        Dashboard
      </a>
      <a
        routerLink="/interview-studio"
        routerLinkActive="nav-active"
        class="nav-link"
      >
        Interview Studio
      </a>
      <!-- Arena Pro Tools -->
      <div class="mx-1 h-5 w-px bg-slate-800"></div>
      <a
        routerLink="/job-xray"
        routerLinkActive="nav-active"
        class="nav-link"
      >
        Job X-Ray
      </a>
      <a
        routerLink="/interview-sim"
        routerLinkActive="nav-active"
        class="nav-link relative"
      >
        Interview Sim
        <svg *ngIf="auth.isLoggedIn() && !auth.isArenaPro()"
             class="ml-1 inline h-3 w-3 text-amber-400" fill="currentColor" viewBox="0 0 20 20"
             title="Upgrade to Arena Pro">
          <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
        </svg>
      </a>
      <a
        routerLink="/salary-coach"
        routerLinkActive="nav-active"
        class="nav-link relative"
      >
        Salary Coach
        <svg *ngIf="auth.isLoggedIn() && !auth.isArenaPro()"
             class="ml-1 inline h-3 w-3 text-amber-400" fill="currentColor" viewBox="0 0 20 20"
             title="Upgrade to Arena Pro">
          <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
        </svg>
      </a>
      <a
        routerLink="/cv-optimizer"
        routerLinkActive="nav-active"
        class="nav-link relative"
      >
        CV Optimizer
        <svg *ngIf="auth.isLoggedIn() && !auth.isArenaPro()"
             class="ml-1 inline h-3 w-3 text-amber-400" fill="currentColor" viewBox="0 0 20 20"
             title="Upgrade to Arena Pro">
          <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
        </svg>
      </a>
      <div class="mx-1 h-5 w-px bg-slate-800"></div>

      <a
        routerLink="/training"
        routerLinkActive="nav-active"
        class="nav-link"
      >
        Training
      </a>
      <a
        routerLink="/profile"
        routerLinkActive="nav-active"
        class="nav-link"
      >
        Profile
      </a>
      <a
        routerLink="/pricing"
        routerLinkActive="nav-active"
        class="nav-link"
      >
        Pricing
      </a>

      <div class="flex flex-1"></div>

      <ng-container *ngIf="!auth.isLoggedIn()">
        <a routerLink="/login" class="nav-pill">Login</a>
        <a routerLink="/register" class="nav-pill border border-emerald-400/60 text-emerald-200">
          Register
        </a>
      </ng-container>

      <ng-container *ngIf="auth.isLoggedIn()">
        <span class="nav-user">
          {{ auth.getCurrentUserName() || auth.getCurrentUserEmail() }}
        </span>
        <button class="nav-pill border border-rose-400/60 text-rose-100" (click)="logout()">
          Logout
        </button>
      </ng-container>
    </div>
  </div>
</nav>
