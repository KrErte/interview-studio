server:
  port: 8080
  forward-headers-strategy: framework
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/plain,text/css,text/javascript,application/javascript

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres:5432/ai}
    username: ${DB_USER:ai}
    password: ${DB_PASS:ai123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    drop-first: false

  h2:
    console:
      enabled: false

logging:
  level:
    root: INFO
    liquibase: INFO
    org.hibernate.SQL: WARN

app:
  cors:
    # Set from env FRONTEND_BASE_URL, e.g. https://your-domain.com
    allowed-origins: ${FRONTEND_BASE_URL:https://your-domain.com}
  lemonsqueezy:
    api-key: ${LEMONSQUEEZY_API_KEY}
    webhook-secret: ${LEMONSQUEEZY_WEBHOOK_SECRET}
    store-id: ${LEMONSQUEEZY_STORE_ID}
    essentials-variant-id: ${LEMONSQUEEZY_ESSENTIALS_VARIANT_ID}
    professional-variant-id: ${LEMONSQUEEZY_PROFESSIONAL_VARIANT_ID}
    lifetime-variant-id: ${LEMONSQUEEZY_LIFETIME_VARIANT_ID}
    arena-pro-variant-id: ${LEMONSQUEEZY_ARENA_PRO_VARIANT_ID}

