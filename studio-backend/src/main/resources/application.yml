server:
  port: 8082

spring:
  profiles:
    active: local
  liquibase:
    drop-first: false

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: ee.kerrete.ainterview.config.H2FriendlyPostgreSQLDialect
        format_sql: true

logging:
  level:
    root: INFO
    liquibase: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

openai:
  base-url: https://api.openai.com/v1
  api-key: ${OPENAI_API_KEY:dummy-openai-key}
  model: gpt-4.1-mini

claude:
  base-url: https://api.anthropic.com/v1
  api-key: ${ANTHROPIC_API_KEY:dummy}
  model: claude-sonnet-4-20250514

management:
  endpoints:
    web:
      exposure:
        include: health,info,mappings
      base-path: /actuator
  health:
    mail:
      enabled: false

# JWT Configuration
app:
  jwt:
    secret: ${JWT_SECRET:this-is-a-development-secret-key-min-32-chars}
    expiration-ms: 86400000        # 24 hours
    refresh-expiration-ms: 604800000  # 7 days
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:sk_test_dummy}
    publishable-key: ${STRIPE_PUBLISHABLE_KEY:pk_test_dummy}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_dummy}
    arena-pro-price-id: ${STRIPE_ARENA_PRO_PRICE_ID:price_dummy}
    starter-monthly-price-id: ${STRIPE_STARTER_MONTHLY_PRICE_ID:price_starter_monthly_dummy}
    starter-annual-price-id: ${STRIPE_STARTER_ANNUAL_PRICE_ID:price_starter_annual_dummy}
    pro-monthly-price-id: ${STRIPE_PRO_MONTHLY_PRICE_ID:price_pro_monthly_dummy}
    pro-annual-price-id: ${STRIPE_PRO_ANNUAL_PRICE_ID:price_pro_annual_dummy}
