services:
  postgres:
    image: postgres:16-alpine
    container_name: interview-postgres
    environment:
      POSTGRES_DB: ai
      POSTGRES_USER: ${DB_USER:-ai}
      POSTGRES_PASSWORD: ${DB_PASS:-ai123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ai} -d ai"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - app-network

  backend:
    build:
      context: ./studio-backend
      dockerfile: Dockerfile
    container_name: interview-backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/ai
      DB_USER: ${DB_USER:-ai}
      DB_PASS: ${DB_PASS:-ai123}
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-your-production-secret-key-min-32-characters}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-dummy-key}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-dummy-key}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_dummy}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_dummy}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_dummy}
      STRIPE_ARENA_PRO_PRICE_ID: ${STRIPE_ARENA_PRO_PRICE_ID:-price_dummy}
      STRIPE_STARTER_MONTHLY_PRICE_ID: ${STRIPE_STARTER_MONTHLY_PRICE_ID:-price_starter_monthly_dummy}
      STRIPE_STARTER_ANNUAL_PRICE_ID: ${STRIPE_STARTER_ANNUAL_PRICE_ID:-price_starter_annual_dummy}
      STRIPE_PRO_MONTHLY_PRICE_ID: ${STRIPE_PRO_MONTHLY_PRICE_ID:-price_pro_monthly_dummy}
      STRIPE_PRO_ANNUAL_PRICE_ID: ${STRIPE_PRO_ANNUAL_PRICE_ID:-price_pro_annual_dummy}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-https://careerrisk.ee}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 3
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend-risk
      dockerfile: Dockerfile
    container_name: interview-frontend
    ports:
      - "4201:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge
